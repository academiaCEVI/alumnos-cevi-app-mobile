<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#09426d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Campus CEVI"/>
<title>Campus CEVI · Gestión</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Google OAuth -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
/* ════════════════════════════════════════
   BRAND BOOK CEVI v4.1 — Mobile App
   ════════════════════════════════════════ */
:root {
  /* PALETA OFICIAL */
  --blue-logo:   #1a5f9a;
  --blue-dark:   #09426d;
  --blue-mid:    #2980b9;
  --blue-light:  #e8f4fd;
  --blue-xdark:  #1a2a3a;
  --white:       #ffffff;
  --gray-bg:     #f5f7fa;
  --gray-border: #dde3ea;
  --text-main:   #2d3748;
  --text-soft:   #5a6a7e;
  --yellow:      #f4c400;
  --wa-green:    #25d366;

  /* APP */
  --nav-h: 60px;
  --tab-h: 58px;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 20px rgba(9,66,109,0.09);
  --shadow-md: 0 8px 32px rgba(9,66,109,0.13);

  font-size: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--gray-bg);
  color: var(--text-main);
  font-family: 'Montserrat', 'Inter', system-ui, sans-serif;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SHELL ──────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── TOP BAR ────────────────────────────── */
#topbar {
  height: var(--nav-h);
  background: var(--white);
  border-bottom: 3px solid var(--blue-logo);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  flex-shrink: 0; position: relative; z-index: 20;
  box-shadow: var(--shadow);
}
.topbar-logo {
  display: inline-flex; align-items: center;
  background: var(--white); border-radius: 4px;
  padding: 2px 6px;
}
.topbar-logo img { height: 34px; display: block; }
.topbar-spacer { flex: 1; }
.topbar-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text-soft); font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--blue-light); padding: 3px 8px;
  border-radius: 4px; border: 1px solid rgba(26,95,154,0.2);
}
.topbar-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius);
  background: var(--gray-bg); border: 1px solid var(--gray-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--blue-logo);
  transition: background .15s; -webkit-tap-highlight-color: transparent;
}
.topbar-icon-btn:active { background: var(--blue-light); }
.topbar-icon-btn svg { width: 18px; height: 18px; }

/* ── SEARCH ─────────────────────────────── */
#searchbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-border);
  padding: 10px 14px; display: none; flex-shrink: 0;
}
#searchbar.open { display: block; }
#searchbar input {
  width: 100%; background: var(--gray-bg);
  border: 1px solid var(--gray-border);
  border-radius: var(--radius); color: var(--text-main);
  padding: 10px 14px; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color .15s;
}
#searchbar input:focus { border-color: var(--blue-logo); }
#searchbar input::placeholder { color: var(--text-soft); }

/* ── CONTENT ────────────────────────────── */
#content {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tab-h) + 12px);
}
#content::-webkit-scrollbar { width: 0; }

/* ── BOTTOM NAV ─────────────────────────── */
#bottomnav {
  height: var(--tab-h);
  background: var(--white);
  border-top: 3px solid var(--blue-logo);
  display: flex; align-items: stretch;
  flex-shrink: 0; z-index: 20;
  box-shadow: 0 -4px 16px rgba(9,66,109,0.08);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; color: var(--text-soft);
  transition: color .15s; border: none; background: none;
  padding: 6px 4px; -webkit-tap-highlight-color: transparent;
  font-family: inherit; position: relative;
}
.nav-item svg { width: 20px; height: 20px; }
.nav-item span { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.nav-item.active { color: var(--blue-logo); }
.nav-item.active::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 3px; background: var(--blue-logo);
  border-radius: 0 0 3px 3px;
}

/* ── LOGIN ──────────────────────────────── */
#login-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 28px; padding: 32px;
  background: linear-gradient(160deg, var(--blue-dark) 0%, #0d5c96 55%, var(--blue-logo) 100%);
}
.login-logo-wrap {
  background: var(--white); border-radius: 10px;
  padding: 12px 24px; display: inline-flex; align-items: center;
  box-shadow: var(--shadow-md);
}
.login-logo-wrap img { height: 48px; display: block; }
.login-tagline {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: rgba(255,255,255,0.7); letter-spacing: 0.16em;
  text-transform: uppercase; text-align: center;
}
.login-title {
  font-size: 22px; font-weight: 700; color: var(--white);
  text-align: center; letter-spacing: -0.01em;
}
.login-sub { color: rgba(255,255,255,0.75); text-align: center; font-size: 13px; line-height: 1.6; }
#google-signin-btn {
  width: 100%; max-width: 280px;
  background: var(--white); color: var(--text-main);
  border: none; border-radius: var(--radius);
  padding: 14px 20px; font-size: 14px; font-weight: 700;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer; box-shadow: var(--shadow-md);
  transition: transform .1s, box-shadow .1s;
}
#google-signin-btn:active { transform: scale(0.97); }

/* ── LOADING ────────────────────────────── */
#loading-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 16px;
  background: var(--blue-dark);
}
.spinner {
  width: 38px; height: 38px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: var(--white);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; }

/* ── SECTION HEADER ─────────────────────── */
.section-header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-border);
  padding: 16px 14px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.section-title {
  font-size: 17px; font-weight: 700;
  color: var(--blue-dark); letter-spacing: -0.01em;
}
.section-count {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--blue-logo); background: var(--blue-light);
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid rgba(26,95,154,0.2); font-weight: 500;
}

/* ── FILTER CHIPS ───────────────────────── */
.filter-chips {
  display: flex; gap: 7px; padding: 10px 14px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--white);
  border-bottom: 1px solid var(--gray-border);
  flex-shrink: 0;
}
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  background: var(--gray-bg); color: var(--text-soft);
  border: 1px solid var(--gray-border);
  transition: all .15s; font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.02em;
}
.chip.active {
  background: var(--blue-logo); color: var(--white);
  border-color: var(--blue-logo);
}

/* ── CARD LIST ──────────────────────────── */
.card-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 9px; }

/* ── ALUMNO CARD ────────────────────────── */
.alumno-card {
  background: var(--white);
  border: 1px solid var(--gray-border);
  border-radius: var(--radius-lg);
  border-top: 3px solid var(--blue-logo);
  padding: 13px;
  display: flex; flex-direction: column; gap: 10px;
  animation: fadeUp .2s ease both;
  box-shadow: var(--shadow);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.alumno-top { display: flex; align-items: center; gap: 11px; }
.alumno-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-logo));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--white); flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}
.alumno-info { flex: 1; min-width: 0; }
.alumno-name {
  font-size: 14px; font-weight: 700; color: var(--text-main);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.alumno-curso {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--text-soft); margin-top: 2px;
  letter-spacing: 0.06em;
}

/* Recibo pills */
.pago-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pago-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 5px;
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
}
.pago-pill.pagado    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.pago-pill.pendiente { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.pago-pill.vencido   { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
.pago-pill.sin-recibo{ background: var(--gray-bg); color: var(--text-soft); border: 1px solid var(--gray-border); }
.pago-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* WhatsApp btn */
.wa-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px; border-radius: var(--radius);
  background: var(--wa-green); color: var(--white);
  font-size: 11px; font-weight: 800; cursor: pointer;
  text-decoration: none; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s; font-family: inherit;
}
.wa-btn:active { background: #1ebe5d; }
.wa-btn svg { width: 13px; height: 13px; }

/* ── HOMOLOGADOS CARD ───────────────────── */
.homo-card {
  background: var(--white);
  border: 1px solid var(--gray-border);
  border-radius: var(--radius-lg);
  border-top: 3px solid var(--blue-mid);
  padding: 13px; display: flex; flex-direction: column; gap: 9px;
  animation: fadeUp .2s ease both;
  box-shadow: var(--shadow);
}
.homo-name { font-size: 14px; font-weight: 700; color: var(--text-main); letter-spacing: -0.01em; }
.homo-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
.homo-tag {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-soft); font-weight: 500;
  background: var(--gray-bg); padding: 3px 9px;
  border-radius: 5px; border: 1px solid var(--gray-border);
  font-family: 'DM Mono', monospace;
}
.homo-price {
  margin-left: auto; font-size: 14px; font-weight: 800;
  color: var(--blue-dark); font-family: 'DM Mono', monospace;
  background: var(--blue-light); padding: 3px 10px;
  border-radius: 5px;
}

/* ── LEADS CARD ─────────────────────────── */
.lead-card {
  background: var(--white);
  border: 1px solid var(--gray-border);
  border-radius: var(--radius-lg);
  border-top: 3px solid var(--blue-dark);
  padding: 13px; display: flex; flex-direction: column; gap: 8px;
  animation: fadeUp .2s ease both;
  box-shadow: var(--shadow);
}
.lead-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.lead-name { font-size: 14px; font-weight: 700; color: var(--text-main); letter-spacing: -0.01em; }
.lead-curso {
  font-size: 11px; color: var(--text-soft); margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.seguimiento-badge {
  flex-shrink: 0; padding: 4px 10px; border-radius: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  font-family: 'DM Mono', monospace;
}
.seg-nuevo      { background: var(--blue-light); color: var(--blue-logo); border: 1px solid rgba(26,95,154,0.2); }
.seg-contactado { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.seg-interesado { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.seg-no-contesta{ background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
.seg-matriculado{ background: var(--blue-dark); color: var(--white); }
.seg-default    { background: var(--gray-bg); color: var(--text-soft); border: 1px solid var(--gray-border); }

/* ── FACTURACIÓN CARD ───────────────────── */
.fact-card {
  background: var(--white);
  border: 1px solid var(--gray-border);
  border-radius: var(--radius-lg);
  border-left: 4px solid var(--blue-logo);
  padding: 12px 13px; display: flex; align-items: center; gap: 10px;
  animation: fadeUp .2s ease both;
  box-shadow: var(--shadow);
}
.fact-num {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--blue-logo); flex-shrink: 0; width: 66px;
  font-weight: 500;
}
.fact-info { flex: 1; min-width: 0; }
.fact-name {
  font-size: 13px; font-weight: 600; color: var(--text-main);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fact-importe {
  font-size: 14px; font-weight: 800;
  color: var(--blue-dark); font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.edit-btn {
  width: 32px; height: 32px; border-radius: var(--radius);
  background: var(--blue-light); border: 1px solid rgba(26,95,154,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--blue-logo); flex-shrink: 0;
  transition: background .15s; -webkit-tap-highlight-color: transparent;
}
.edit-btn:active { background: var(--blue-logo); color: var(--white); }
.edit-btn svg { width: 13px; height: 13px; }

/* ── EMPTY STATE ────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 32px;
  color: var(--text-soft); font-size: 13px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }
.empty-state p { line-height: 1.6; }

/* ── MODAL ──────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(9,66,109,0.55); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal-sheet {
  width: 100%; background: var(--white);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  border-top: 3px solid var(--blue-logo);
  padding: 16px 18px 40px;
  animation: slideUp .2s ease;
  max-height: 90dvh; overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(9,66,109,0.18);
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } }
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--gray-border); margin: 0 auto 18px;
}
.modal-title {
  font-size: 16px; font-weight: 700; color: var(--blue-dark);
  margin-bottom: 16px; letter-spacing: -0.01em;
}
.modal-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 13px; }
.modal-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text-soft); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
}
.modal-value { font-size: 13px; color: var(--text-main); font-weight: 500; }
.modal-input {
  background: var(--gray-bg); border: 1px solid var(--gray-border);
  border-radius: var(--radius); color: var(--text-main);
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  width: 100%; outline: none; transition: border-color .15s;
}
.modal-input:focus { border-color: var(--blue-logo); }
.modal-actions { display: flex; gap: 9px; margin-top: 18px; }
.btn {
  flex: 1; padding: 13px; border-radius: var(--radius);
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: none; font-family: inherit;
  transition: opacity .15s; -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.85; }
.btn-primary { background: var(--blue-logo); color: var(--white); }
.btn-ghost {
  background: var(--gray-bg); color: var(--text-soft);
  border: 1px solid var(--gray-border);
}

/* ── TOAST ──────────────────────────────── */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + 14px); left: 50%;
  transform: translateX(-50%);
  background: var(--blue-xdark); color: var(--white);
  padding: 10px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  border-top: 2px solid var(--blue-logo);
  box-shadow: var(--shadow-md);
  z-index: 200; white-space: nowrap;
  animation: toastIn .2s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- ───── LOGIN ───── -->

</div><!-- /app -->

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden" onclick="cerrarModalOverlay(event)">
  <div class="modal-sheet" id="modal-sheet"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — ajusta los IDs de tus Google Sheets
// ═══════════════════════════════════════════════════
const CLIENT_ID  = '713576632854-meipsd4hr2fo852k6t1i0csbf7i20rga.apps.googleusercontent.com';
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const FACT_SHEET = '1gu2mtmj1IcdvB_TNm-tjlKUjR6Qifqcm3tn4qmzrrv4';

const SHEETS_CONFIG = {
  alumnos: [
    { nombre: 'Primaria 2028',     id: 'TU_SHEET_ID_PRIMARIA' },
    { nombre: 'Secundaria 2027',   id: 'TU_SHEET_ID_SECUNDARIA' },
    { nombre: 'APTIS Verano 2026', id: 'TU_SHEET_ID_APTIS' },
  ],
  homologados: { id: 'TU_SHEET_ID_HOMOLOGADOS', hoja: 'Homologados 2026' },
  leads:       { id: 'TU_SHEET_ID_LEADS',       hoja: 'Leads' },
};
const SERIES = ['A','C','E','F','G','RECTIFICATIVAS'];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let tokenClient, accessToken;
const estado = {
  vista: 'alumnos',
  alumnos: [], alumnosFiltro: 'todos',
  homo:    [], homoFiltro: 'todos',
  leads:   [], leadsFiltro: 'todos',
  fact:    [], factFiltro: 'A',
  busqueda: '',
};

const LABELS = { alumnos: 'ALUMNOS', homo: 'HOMOLOGADOS', leads: 'LEADS', fact: 'FACTURACIÓN' };

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function iniciarLogin() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { mostrarToast('Error de autenticación'); return; }
      accessToken = resp.access_token;
      mostrarApp();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function mostrarApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('main-app').style.display = 'flex';
  cargarTodo();
}

// ═══════════════════════════════════════════════════
// SHEETS API
// ═══════════════════════════════════════════════════
async function sheetsGet(id, range) {
  const r = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  if (!r.ok) throw new Error('Sheets ' + r.status);
  return (await r.json()).values || [];
}

async function sheetsUpdate(id, range, values) {
  const r = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {
      method: 'PUT',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ range, majorDimension: 'ROWS', values })
    }
  );
  return r.ok;
}

// ═══════════════════════════════════════════════════
// CARGA
// ═══════════════════════════════════════════════════
async function cargarTodo() {
  try {
    await Promise.all([cargarAlumnos(), cargarHomologados(), cargarLeads(), cargarFacturacion()]);
  } catch(e) { console.error(e); mostrarToast('⚠️ Error cargando datos'); }
  document.getElementById('loading-screen').classList.add('hidden');
  navTo('alumnos');
}

async function cargarAlumnos() {
  let todos = [];
  for (const s of SHEETS_CONFIG.alumnos) {
    try {
      const rows = await sheetsGet(s.id, 'A2:AT500');
      rows.forEach(r => {
        const nombre = ((r[1]||'') + ' ' + (r[2]||'')).trim();
        if (!nombre) return;
        const recibos = [];
        const labels = ['R1','R2','R3','R4','R5','R6'];
        for (let i = 0; i < 6; i++) {
          const v = (r[34+i]||'').trim().toUpperCase();
          recibos.push({ id: labels[i], estado: v==='PAGADO'||v==='OK'||v==='P' ? 'pagado' : v==='PENDIENTE' ? 'pendiente' : v==='VENCIDO' ? 'vencido' : 'sin-recibo' });
        }
        todos.push({ nombre, curso: s.nombre, telefono: (r[4]||'').trim(), recibos });
      });
    } catch(e) { console.warn(s.nombre, e); }
  }
  estado.alumnos = todos;
}

async function cargarHomologados() {
  try {
    const rows = await sheetsGet(SHEETS_CONFIG.homologados.id, `${SHEETS_CONFIG.homologados.hoja}!A2:Z500`);
    estado.homo = rows.map(r => ({
      nombre: ((r[1]||'') + ' ' + (r[2]||'')).trim(),
      fecha: r[3]||'', curso: r[5]||'', precio: r[7]||''
    })).filter(x => x.nombre);
  } catch(e) { console.warn('Homologados', e); }
}

async function cargarLeads() {
  try {
    const rows = await sheetsGet(SHEETS_CONFIG.leads.id, `${SHEETS_CONFIG.leads.hoja}!A2:Z500`);
    estado.leads = rows.map(r => ({
      nombre: ((r[1]||'') + ' ' + (r[2]||'')).trim(),
      curso: r[4]||'', seguimiento: r[6]||''
    })).filter(x => x.nombre);
  } catch(e) { console.warn('Leads', e); }
}

async function cargarFacturacion() {
  let todas = [];
  for (const serie of SERIES) {
    try {
      const hoja = serie === 'RECTIFICATIVAS' ? 'RECTIFICATIVAS' : `Serie ${serie}`;
      const rows = await sheetsGet(FACT_SHEET, `${hoja}!A2:G500`);
      rows.forEach((r, i) => {
        if (!r[1]) return;
        todas.push({ serie, hoja, num: r[5]||'', nombre: r[1]||'', importe: r[4]||'', rowIndex: i+2 });
      });
    } catch(e) { /* serie vacía */ }
  }
  estado.fact = todas;
}

// ═══════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════
function navTo(vista) {
  estado.vista = vista;
  ['alumnos','homo','leads','fact'].forEach(v => {
    document.getElementById(`view-${v}`).classList.add('hidden');
    document.getElementById(`nav-${v}`).classList.remove('active');
  });
  document.getElementById(`view-${vista}`).classList.remove('hidden');
  document.getElementById(`nav-${vista}`).classList.add('active');
  document.getElementById('topbar-section-label').textContent = LABELS[vista];
  document.getElementById('search-input').value = '';
  estado.busqueda = '';
  renderVista(vista);
}

function renderVista(v) {
  ({ alumnos: renderAlumnos, homo: renderHomo, leads: renderLeads, fact: renderFact })[v]();
}

// ═══════════════════════════════════════════════════
// BUSQUEDA
// ═══════════════════════════════════════════════════
function toggleSearch() {
  const sb = document.getElementById('searchbar');
  sb.classList.toggle('open');
  if (sb.classList.contains('open')) document.getElementById('search-input').focus();
}

function aplicarBusqueda() {
  estado.busqueda = document.getElementById('search-input').value.toLowerCase();
  renderVista(estado.vista);
}

function filtrarTexto(lista, campos) {
  if (!estado.busqueda) return lista;
  return lista.filter(item => campos.some(c => (item[c]||'').toLowerCase().includes(estado.busqueda)));
}

// ═══════════════════════════════════════════════════
// RENDERS
// ═══════════════════════════════════════════════════
function renderAlumnos() {
  const cursos = ['todos', ...new Set(estado.alumnos.map(a => a.curso))];
  document.getElementById('chips-alumnos').innerHTML = cursos.map(c =>
    `<button class="chip ${estado.alumnosFiltro===c?'active':''}" onclick="filtroAlumnos('${c}')">${c==='todos'?'Todos':c}</button>`
  ).join('');

  let lista = estado.alumnos;
  if (estado.alumnosFiltro !== 'todos') lista = lista.filter(a => a.curso === estado.alumnosFiltro);
  lista = filtrarTexto(lista, ['nombre','curso']);

  document.getElementById('count-alumnos').textContent = lista.length;
  const el = document.getElementById('list-alumnos');
  if (!lista.length) { el.innerHTML = emptyState('🎓', 'Sin alumnos en este filtro'); return; }

  el.innerHTML = lista.map((a, i) => {
    const ini = a.nombre.split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase();
    const waHref = a.telefono ? `https://wa.me/34${a.telefono.replace(/\D/g,'')}` : null;
    const recVisibles = a.recibos.filter(r => r.estado !== 'sin-recibo');
    const pillsHtml = recVisibles.length
      ? recVisibles.map(r => `<div class="pago-pill ${r.estado}"><div class="pago-dot"></div>${r.id}</div>`).join('')
      : `<div class="pago-pill sin-recibo">Sin recibos registrados</div>`;

    return `<div class="alumno-card" style="animation-delay:${Math.min(i,10)*0.03}s">
      <div class="alumno-top">
        <div class="alumno-avatar">${ini}</div>
        <div class="alumno-info">
          <div class="alumno-name">${a.nombre}</div>
          <div class="alumno-curso">${a.curso}</div>
        </div>
        ${waHref ? `<a class="wa-btn" href="${waHref}" target="_blank" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WA
        </a>` : ''}
      </div>
      <div class="pago-pills">${pillsHtml}</div>
    </div>`;
  }).join('');
}
function filtroAlumnos(c) { estado.alumnosFiltro = c; renderAlumnos(); }

function renderHomo() {
  const cursos = ['todos', ...new Set(estado.homo.map(h=>h.curso).filter(Boolean))];
  document.getElementById('chips-homo').innerHTML = cursos.map(c =>
    `<button class="chip ${estado.homoFiltro===c?'active':''}" onclick="filtroHomo('${c}')">${c==='todos'?'Todos':c}</button>`
  ).join('');

  let lista = estado.homo;
  if (estado.homoFiltro !== 'todos') lista = lista.filter(h => h.curso === estado.homoFiltro);
  lista = filtrarTexto(lista, ['nombre','curso']);

  document.getElementById('count-homo').textContent = lista.length;
  const el = document.getElementById('list-homo');
  if (!lista.length) { el.innerHTML = emptyState('🏫', 'Sin registros en este filtro'); return; }

  el.innerHTML = lista.map((h, i) =>
    `<div class="homo-card" style="animation-delay:${Math.min(i,10)*0.03}s">
      <div class="homo-name">${h.nombre}</div>
      <div class="homo-meta">
        ${h.fecha ? `<div class="homo-tag">📅 ${h.fecha}</div>` : ''}
        ${h.curso ? `<div class="homo-tag">📚 ${h.curso}</div>` : ''}
        ${h.precio ? `<div class="homo-price">${formatPrecio(h.precio)}</div>` : ''}
      </div>
    </div>`
  ).join('');
}
function filtroHomo(c) { estado.homoFiltro = c; renderHomo(); }

function renderLeads() {
  const segs = ['todos', ...new Set(estado.leads.map(l=>l.seguimiento).filter(Boolean))];
  document.getElementById('chips-leads').innerHTML = segs.map(s =>
    `<button class="chip ${estado.leadsFiltro===s?'active':''}" onclick="filtroLeads('${s}')">${s==='todos'?'Todos':s}</button>`
  ).join('');

  let lista = estado.leads;
  if (estado.leadsFiltro !== 'todos') lista = lista.filter(l => l.seguimiento === estado.leadsFiltro);
  lista = filtrarTexto(lista, ['nombre','curso','seguimiento']);

  document.getElementById('count-leads').textContent = lista.length;
  const el = document.getElementById('list-leads');
  if (!lista.length) { el.innerHTML = emptyState('📞', 'Sin leads en este filtro'); return; }

  el.innerHTML = lista.map((l, i) => `<div class="lead-card" style="animation-delay:${Math.min(i,10)*0.03}s">
    <div class="lead-top">
      <div>
        <div class="lead-name">${l.nombre}</div>
        <div class="lead-curso">${l.curso||'—'}</div>
      </div>
      <div class="seguimiento-badge ${claseSeg(l.seguimiento)}">${l.seguimiento||'—'}</div>
    </div>
  </div>`).join('');
}
function filtroLeads(s) { estado.leadsFiltro = s; renderLeads(); }

function claseSeg(s) {
  if (!s) return 'seg-default';
  const x = s.toLowerCase();
  if (x.includes('nuevo'))       return 'seg-nuevo';
  if (x.includes('contactado'))  return 'seg-contactado';
  if (x.includes('interesado'))  return 'seg-interesado';
  if (x.includes('no contesta')) return 'seg-no-contesta';
  if (x.includes('matriculado')) return 'seg-matriculado';
  return 'seg-default';
}

function renderFact() {
  document.getElementById('chips-fact').innerHTML = SERIES.map(s =>
    `<button class="chip ${estado.factFiltro===s?'active':''}" onclick="filtroFact('${s}')">${s}</button>`
  ).join('');

  let lista = estado.fact.filter(f => f.serie === estado.factFiltro);
  lista = filtrarTexto(lista, ['nombre','num']);

  document.getElementById('count-fact').textContent = lista.length;
  const el = document.getElementById('list-fact');
  if (!lista.length) { el.innerHTML = emptyState('📋', 'Sin facturas en esta serie'); return; }

  el.innerHTML = lista.map((f, i) =>
    `<div class="fact-card" style="animation-delay:${Math.min(i,10)*0.03}s">
      <div class="fact-num">${f.num||'—'}</div>
      <div class="fact-info"><div class="fact-name">${f.nombre}</div></div>
      <div class="fact-importe">${formatPrecio(f.importe)}</div>
      <div class="edit-btn" onclick="abrirEditarFactura(${JSON.stringify(f).replace(/"/g,'&quot;')})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
    </div>`
  ).join('');
}
function filtroFact(s) { estado.factFiltro = s; renderFact(); }

// ═══════════════════════════════════════════════════
// MODAL FACTURA
// ═══════════════════════════════════════════════════
function abrirEditarFactura(f) {
  document.getElementById('modal-sheet').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-title">Editar factura ${f.num||''}</div>
    <div class="modal-row">
      <div class="modal-label">Nombre y apellidos</div>
      <input class="modal-input" id="edit-nombre" value="${f.nombre}"/>
    </div>
    <div class="modal-row">
      <div class="modal-label">Importe</div>
      <input class="modal-input" id="edit-importe" value="${f.importe}" type="text"/>
    </div>
    <div class="modal-row">
      <div class="modal-label">Nº Factura</div>
      <div class="modal-value" style="font-family:'DM Mono',monospace;color:var(--blue-logo)">${f.num||'—'}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarFactura(${JSON.stringify(f).replace(/"/g,'&quot;')})">Guardar</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

async function guardarFactura(f) {
  const nombre  = document.getElementById('edit-nombre').value;
  const importe = document.getElementById('edit-importe').value;
  cerrarModal();
  mostrarToast('Guardando…');
  const ok = await sheetsUpdate(FACT_SHEET, `${f.hoja}!B${f.rowIndex}:E${f.rowIndex}`, [[nombre,'','',importe]]);
  mostrarToast(ok ? '✔️ Guardado correctamente' : '⚠️ Error al guardar');
  if (ok) { await cargarFacturacion(); renderFact(); }
}

function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
function cerrarModalOverlay(e) { if (e.target===document.getElementById('modal')) cerrarModal(); }

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function formatPrecio(v) {
  if (!v) return '—';
  const n = parseFloat(String(v).replace(',','.'));
  if (isNaN(n)) return v;
  return n.toLocaleString('es-ES', { style:'currency', currency:'EUR' });
}

function emptyState(icon, msg) {
  return `<div class="empty-state"><div class="icon">${icon}</div><p>${msg}</p></div>`;
}

function mostrarToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}
</script>
