<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Campus CEVI"/>
<meta name="theme-color" content="#09426d"/>
<title>Campus CEVI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --blue-logo:  #1a5f9a;
  --blue-dark:  #09426d;
  --blue-mid:   #2980b9;
  --blue-light: #e8f4fd;
  --blue-xdark: #1a2a3a;
  --white:      #ffffff;
  --gray-bg:    #f5f7fa;
  --gray-border:#dde3ea;
  --text-main:  #2d3748;
  --text-soft:  #5a6a7e;
  --wa-green:   #25d366;
  --shadow:     0 4px 20px rgba(9,66,109,0.09);
  --shadow-md:  0 8px 32px rgba(9,66,109,0.13);
  --radius:     8px;
  --radius-lg:  12px;
  --nav-h: 60px;
  --tab-h: 58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--gray-bg);color:var(--text-main);font-family:'Montserrat',system-ui,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:28px;padding:32px;background:linear-gradient(160deg,#09426d 0%,#0d5c96 55%,#1a5f9a 100%)}
.login-logo-wrap{background:#fff;border-radius:10px;padding:12px 24px;display:inline-flex;align-items:center;box-shadow:var(--shadow-md)}
.login-logo-wrap img{height:48px;display:block}
.login-title{font-size:22px;font-weight:700;color:#fff;text-align:center;letter-spacing:-0.01em}
.login-sub{color:rgba(255,255,255,0.75);text-align:center;font-size:13px;line-height:1.6}
.login-tag{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:0.16em;text-transform:uppercase;text-align:center}
#google-signin-btn{width:100%;max-width:280px;background:#fff;color:#2d3748;border:none;border-radius:var(--radius);padding:14px 20px;font-size:14px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:var(--shadow-md);transition:transform .1s}
#google-signin-btn:active{transform:scale(0.97)}

/* LOADING */
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;background:var(--blue-dark)}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:rgba(255,255,255,0.7);font-size:13px;font-weight:500}

/* MAIN */
#main-app{display:flex;flex-direction:column;height:100%}

/* TOPBAR */
#topbar{height:var(--nav-h);background:#fff;border-bottom:3px solid var(--blue-logo);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:20;box-shadow:var(--shadow)}
.topbar-logo{display:inline-flex;align-items:center;background:#fff;border-radius:4px;padding:2px 6px}
.topbar-logo img{height:32px;display:block}
.topbar-spacer{flex:1}
.topbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-soft);font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--blue-light);padding:3px 8px;border-radius:4px;border:1px solid rgba(26,95,154,0.2)}
.icon-btn{width:36px;height:36px;border-radius:var(--radius);background:var(--gray-bg);border:1px solid var(--gray-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue-logo);transition:background .15s;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:var(--blue-light)}
.icon-btn svg{width:18px;height:18px}

/* SEARCHBAR */
#searchbar{background:#fff;border-bottom:1px solid var(--gray-border);padding:10px 14px;display:none;flex-shrink:0}
#searchbar.open{display:block}
#searchbar input{width:100%;background:var(--gray-bg);border:1px solid var(--gray-border);border-radius:var(--radius);color:var(--text-main);padding:10px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
#searchbar input:focus{border-color:var(--blue-logo)}
#searchbar input::placeholder{color:var(--text-soft)}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + 12px)}
#content::-webkit-scrollbar{width:0}

/* BOTTOM NAV */
#bottomnav{height:var(--tab-h);background:#fff;border-top:3px solid var(--blue-logo);display:flex;align-items:stretch;flex-shrink:0;z-index:20;box-shadow:0 -4px 16px rgba(9,66,109,0.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-soft);border:none;background:none;padding:6px 4px;-webkit-tap-highlight-color:transparent;font-family:inherit;position:relative;transition:color .15s}
.nav-item svg{width:20px;height:20px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.nav-item.active{color:var(--blue-logo)}
.nav-item.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--blue-logo);border-radius:0 0 3px 3px}

/* SECTION HEADER */
.sec-header{background:#fff;border-bottom:1px solid var(--gray-border);padding:14px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:17px;font-weight:700;color:var(--blue-dark);letter-spacing:-0.01em}
.sec-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue-logo);background:var(--blue-light);padding:3px 10px;border-radius:20px;border:1px solid rgba(26,95,154,0.2)}

/* CHIPS */
.chips{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--gray-border)}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--gray-bg);color:var(--text-soft);border:1px solid var(--gray-border);font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .15s}
.chip.active{background:var(--blue-logo);color:#fff;border-color:var(--blue-logo)}

/* CARDS */
.card-list{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ALUMNO CARD */
.alumno-card{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius-lg);border-top:3px solid var(--blue-logo);padding:13px;display:flex;flex-direction:column;gap:10px;animation:fadeUp .2s ease both;box-shadow:var(--shadow)}
.alumno-top{display:flex;align-items:center;gap:11px}
.alumno-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue-dark),var(--blue-logo));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.alumno-info{flex:1;min-width:0}
.alumno-name{font-size:14px;font-weight:700;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em}
.alumno-curso{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-soft);margin-top:2px;letter-spacing:0.06em}
.pago-pills{display:flex;gap:5px;flex-wrap:wrap}
.pago-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500}
.pago-pill.pagado{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.pago-pill.pendiente{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.pago-pill.vencido{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.pago-pill.sin-recibo{background:var(--gray-bg);color:var(--text-soft);border:1px solid var(--gray-border)}
.pago-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.wa-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--radius);background:var(--wa-green);color:#fff;font-size:11px;font-weight:800;text-decoration:none;flex-shrink:0;-webkit-tap-highlight-color:transparent;font-family:inherit}
.wa-btn svg{width:13px;height:13px}

/* HOMO CARD */
.homo-card{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius-lg);border-top:3px solid var(--blue-mid);padding:13px;display:flex;flex-direction:column;gap:9px;animation:fadeUp .2s ease both;box-shadow:var(--shadow)}
.homo-name{font-size:14px;font-weight:700;color:var(--text-main);letter-spacing:-0.01em}
.homo-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.homo-tag{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-soft);font-weight:500;background:var(--gray-bg);padding:3px 9px;border-radius:5px;border:1px solid var(--gray-border);font-family:'DM Mono',monospace}
.homo-price{margin-left:auto;font-size:14px;font-weight:800;color:var(--blue-dark);font-family:'DM Mono',monospace;background:var(--blue-light);padding:3px 10px;border-radius:5px}

/* LEAD CARD */
.lead-card{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius-lg);border-top:3px solid var(--blue-dark);padding:13px;display:flex;flex-direction:column;gap:8px;animation:fadeUp .2s ease both;box-shadow:var(--shadow)}
.lead-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.lead-name{font-size:14px;font-weight:700;color:var(--text-main);letter-spacing:-0.01em}
.lead-curso{font-size:11px;color:var(--text-soft);margin-top:2px;font-family:'DM Mono',monospace}
.seg-badge{flex-shrink:0;padding:4px 10px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:0.04em;font-family:'DM Mono',monospace}
.seg-nuevo{background:var(--blue-light);color:var(--blue-logo);border:1px solid rgba(26,95,154,0.2)}
.seg-contactado{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.seg-interesado{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.seg-no-contesta{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.seg-matriculado{background:var(--blue-dark);color:#fff}
.seg-default{background:var(--gray-bg);color:var(--text-soft);border:1px solid var(--gray-border)}

/* FACT CARD */
.fact-card{background:#fff;border:1px solid var(--gray-border);border-radius:var(--radius-lg);border-left:4px solid var(--blue-logo);padding:12px 13px;display:flex;align-items:center;gap:10px;animation:fadeUp .2s ease both;box-shadow:var(--shadow)}
.fact-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue-logo);flex-shrink:0;width:66px;font-weight:500}
.fact-info{flex:1;min-width:0}
.fact-name{font-size:13px;font-weight:600;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fact-importe{font-size:14px;font-weight:800;color:var(--blue-dark);font-family:'DM Mono',monospace;flex-shrink:0}
.edit-btn{width:32px;height:32px;border-radius:var(--radius);background:var(--blue-light);border:1px solid rgba(26,95,154,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue-logo);flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:background .15s}
.edit-btn:active{background:var(--blue-logo);color:#fff}
.edit-btn svg{width:13px;height:13px}

/* EMPTY */
.empty{text-align:center;padding:60px 32px;color:var(--text-soft);font-size:13px}
.empty .icon{font-size:36px;margin-bottom:10px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(9,66,109,0.55);backdrop-filter:blur(4px);display:flex;align-items:flex-end;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}}
.modal-sheet{width:100%;background:#fff;border-radius:var(--radius-lg) var(--radius-lg) 0 0;border-top:3px solid var(--blue-logo);padding:16px 18px 40px;animation:slideUp .2s ease;max-height:90dvh;overflow-y:auto;box-shadow:0 -8px 40px rgba(9,66,109,0.18)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--gray-border);margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:700;color:var(--blue-dark);margin-bottom:16px;letter-spacing:-0.01em}
.modal-row{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.modal-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-soft);font-weight:500;text-transform:uppercase;letter-spacing:0.12em}
.modal-val{font-size:13px;color:var(--text-main);font-weight:500}
.modal-input{background:var(--gray-bg);border:1px solid var(--gray-border);border-radius:var(--radius);color:var(--text-main);padding:10px 12px;font-size:14px;font-family:inherit;width:100%;outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--blue-logo)}
.modal-actions{display:flex;gap:9px;margin-top:18px}
.btn{flex:1;padding:13px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--blue-logo);color:#fff}
.btn-ghost{background:var(--gray-bg);color:var(--text-soft);border:1px solid var(--gray-border)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tab-h) + 14px);left:50%;transform:translateX(-50%);background:var(--blue-xdark);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;border-top:2px solid var(--blue-logo);box-shadow:var(--shadow-md);z-index:200;white-space:nowrap;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}}

.hidden{display:none!important}
</style>
</head>

const SHEETS_CONFIG = {
  alumnos: [
    { nombre: 'Primaria 2028',     id: '1JllOQaNs7B16kn5oB4rsq-E-Rgefb2G9yN727mPyBKs', hoja: 'Primaria 2028' },
    { nombre: 'Secundaria 2027',   id: '1PmH2t_8kG4KpzqFEJjRHRanh9HKAbXsnMl9oJphwGII', hoja: 'Secundaria 2027' },
    { nombre: 'APTIS Verano 2026', id: '1QDMDpVb-gQaux4Ig_T7r5rMIUoi5thaNxvI4I-Ly8OA', hoja: 'Hoja 1' }
  ],
  homologados: { id: '1S5H_sXl7mHRMTvdDb1yyrcOqhDCNYKXkSERB-dHN-1w', hoja: 'Hoja 1' },
  leads:       { id: '15vTE0KugBuW8oDvdJi-Hei9WXWMzG471XfxnX4lbifw',  hoja: 'Hoja 1' }
};
const SERIES = ['A','C','E','F','G','RECTIFICATIVAS'];
const LABELS = { alumnos:'ALUMNOS', homo:'HOMOLOGADOS', leads:'LEADS', fact:'FACTURACIÓN' };

let tokenClient, accessToken;
const E = {
  vista: 'alumnos',
  alumnos: [], filtroAlumnos: 'todos',
  homo: [],    filtroHomo: 'todos',
  leads: [],   filtroLeads: 'todos',
  fact: [],    filtroFact: 'A',
  q: ''
};

function iniciarLogin() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: function(resp) {
      if (resp.error) { toast('Error de autenticación'); return; }
      accessToken = resp.access_token;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('loading-screen').classList.remove('hidden');
      cargarTodo();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function sheetsGet(id, range) {
  var r = await fetch(
    'https://sheets.googleapis.com/v4/spreadsheets/' + id + '/values/' + encodeURIComponent(range),
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  if (!r.ok) throw new Error('Sheets ' + r.status + ' ' + range);
  var d = await r.json();
  return d.values || [];
}

async function sheetsUpdate(id, range, values) {
  var r = await fetch(
    'https://sheets.googleapis.com/v4/spreadsheets/' + id + '/values/' + encodeURIComponent(range) + '?valueInputOption=USER_ENTERED',
    { method: 'PUT', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ range: range, majorDimension: 'ROWS', values: values }) }
  );
  return r.ok;
}

async function cargarTodo() {
  var results = await Promise.allSettled([
    cargarAlumnos(), cargarHomologados(), cargarLeads(), cargarFacturacion()
  ]);
  results.forEach(function(r, i) {
    if (r.status === 'rejected') console.warn('Modulo ' + i + ' fallo:', r.reason);
  });
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  navTo('alumnos');
}

async function cargarAlumnos() {
  var todos = [];
  for (var i = 0; i < SHEETS_CONFIG.alumnos.length; i++) {
    var s = SHEETS_CONFIG.alumnos[i];
    try {
      var rango = s.hoja ? s.hoja + '!A2:AT500' : 'A2:AT500';
      var rows = await sheetsGet(s.id, rango);
      for (var j = 0; j < rows.length; j++) {
        var r = rows[j];
        var nombre = ((r[1]||'') + ' ' + (r[2]||'')).trim();
        if (!nombre) continue;
        var recibos = [];
        var etiquetas = ['R1','R2','R3','R4','R5','R6'];
        for (var k = 0; k < 6; k++) {
          var v = (r[34+k]||'').trim().toUpperCase();
          var est = (v==='PAGADO'||v==='OK'||v==='P') ? 'pagado' : v==='PENDIENTE' ? 'pendiente' : v==='VENCIDO' ? 'vencido' : 'sin-recibo';
          recibos.push({ id: etiquetas[k], estado: est });
        }
        todos.push({ nombre: nombre, curso: s.nombre, telefono: (r[4]||'').trim(), recibos: recibos });
      }
    } catch(e) { console.warn(s.nombre, e); }
  }
  E.alumnos = todos;
}

async function cargarHomologados() {
  try {
    var rows = await sheetsGet(SHEETS_CONFIG.homologados.id, SHEETS_CONFIG.homologados.hoja + '!A2:Z500');
    E.homo = rows.map(function(r) {
      return { nombre: ((r[1]||'') + ' ' + (r[2]||'')).trim(), fecha: r[3]||'', curso: r[5]||'', precio: r[7]||'' };
    }).filter(function(x) { return x.nombre; });
  } catch(e) { console.warn('Homologados', e); }
}

async function cargarLeads() {
  try {
    var rows = await sheetsGet(SHEETS_CONFIG.leads.id, SHEETS_CONFIG.leads.hoja + '!A2:Z500');
    E.leads = rows.map(function(r) {
      return { nombre: ((r[1]||'') + ' ' + (r[2]||'')).trim(), curso: r[4]||'', seguimiento: r[6]||'' };
    }).filter(function(x) { return x.nombre; });
  } catch(e) { console.warn('Leads', e); }
}

async function cargarFacturacion() {
  var todas = [];
  for (var s = 0; s < SERIES.length; s++) {
    try {
      var serie = SERIES[s];
      var hoja = serie === 'RECTIFICATIVAS' ? 'RECTIFICATIVAS' : 'Serie ' + serie;
      var rows = await sheetsGet(FACT_SHEET, hoja + '!A2:G500');
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        if (!r[1]) continue;
        todas.push({ serie: serie, hoja: hoja, num: r[5]||'', nombre: r[1]||'', importe: r[4]||'', rowIndex: i+2 });
      }
    } catch(e) { /* serie vacia */ }
  }
  E.fact = todas;
}

function navTo(vista) {
  E.vista = vista;
  ['alumnos','homo','leads','fact'].forEach(function(v) {
    document.getElementById('view-' + v).classList.add('hidden');
    document.getElementById('nav-' + v).classList.remove('active');
  });
  document.getElementById('view-' + vista).classList.remove('hidden');
  document.getElementById('nav-' + vista).classList.add('active');
  document.getElementById('topbar-label').textContent = LABELS[vista];
  document.getElementById('search-input').value = '';
  E.q = '';
  render(vista);
}

function render(v) {
  if (v === 'alumnos') renderAlumnos();
  else if (v === 'homo') renderHomo();
  else if (v === 'leads') renderLeads();
  else renderFact();
}

function toggleSearch() {
  var sb = document.getElementById('searchbar');
  sb.classList.toggle('open');
  if (sb.classList.contains('open')) document.getElementById('search-input').focus();
}

function onBusqueda() {
  E.q = document.getElementById('search-input').value.toLowerCase();
  render(E.vista);
}

function filtrarQ(lista, campos) {
  if (!E.q) return lista;
  return lista.filter(function(item) {
    return campos.some(function(c) { return (item[c]||'').toLowerCase().indexOf(E.q) !== -1; });
  });
}

function renderAlumnos() {
  var cursos = ['todos'].concat([...new Set(E.alumnos.map(function(a) { return a.curso; }))]);
  document.getElementById('chips-alumnos').innerHTML = cursos.map(function(c) {
    return '<button class="chip ' + (E.filtroAlumnos===c?'active':'') + '" onclick="setFiltroAlumnos('' + c + '')">' + (c==='todos'?'Todos':c) + '</button>';
  }).join('');
  var lista = E.alumnos;
  if (E.filtroAlumnos !== 'todos') lista = lista.filter(function(a) { return a.curso === E.filtroAlumnos; });
  lista = filtrarQ(lista, ['nombre','curso']);
  document.getElementById('cnt-alumnos').textContent = lista.length;
  var el = document.getElementById('list-alumnos');
  if (!lista.length) { el.innerHTML = emptyHTML('🎓', 'Sin alumnos'); return; }
  el.innerHTML = lista.map(function(a, i) {
    var ini = a.nombre.split(' ').slice(0,2).map(function(x){return x[0]||'';}).join('').toUpperCase();
    var waHref = a.telefono ? 'https://wa.me/34' + a.telefono.replace(/\D/g,'') : null;
    var vis = a.recibos.filter(function(r){return r.estado!=='sin-recibo';});
    var pills = vis.length ? vis.map(function(r){return '<div class="pago-pill '+r.estado+'"><div class="pago-dot"></div>'+r.id+'</div>';}).join('') : '<div class="pago-pill sin-recibo">Sin recibos</div>';
    var wa = waHref ? '<a class="wa-btn" href="'+waHref+'" target="_blank" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>WA</a>' : '';
    return '<div class="alumno-card" style="animation-delay:'+Math.min(i,10)*0.03+'s"><div class="alumno-top"><div class="alumno-avatar">'+ini+'</div><div class="alumno-info"><div class="alumno-name">'+a.nombre+'</div><div class="alumno-curso">'+a.curso+'</div></div>'+wa+'</div><div class="pago-pills">'+pills+'</div></div>';
  }).join('');
}
function setFiltroAlumnos(c) { E.filtroAlumnos = c; renderAlumnos(); }

function renderHomo() {
  var cursos = ['todos'].concat([...new Set(E.homo.map(function(h){return h.curso;}).filter(Boolean))]);
  document.getElementById('chips-homo').innerHTML = cursos.map(function(c) {
    return '<button class="chip '+(E.filtroHomo===c?'active':'')+'" onclick="setFiltroHomo(''+c+'')">'+(c==='todos'?'Todos':c)+'</button>';
  }).join('');
  var lista = E.homo;
  if (E.filtroHomo !== 'todos') lista = lista.filter(function(h){return h.curso===E.filtroHomo;});
  lista = filtrarQ(lista, ['nombre','curso']);
  document.getElementById('cnt-homo').textContent = lista.length;
  var el = document.getElementById('list-homo');
  if (!lista.length) { el.innerHTML = emptyHTML('🏫','Sin registros'); return; }
  el.innerHTML = lista.map(function(h,i) {
    return '<div class="homo-card" style="animation-delay:'+Math.min(i,10)*0.03+'s"><div class="homo-name">'+h.nombre+'</div><div class="homo-meta">'+(h.fecha?'<div class="homo-tag">📅 '+h.fecha+'</div>':'')+(h.curso?'<div class="homo-tag">📚 '+h.curso+'</div>':'')+(h.precio?'<div class="homo-price">'+precio(h.precio)+'</div>':'')+'</div></div>';
  }).join('');
}
function setFiltroHomo(c) { E.filtroHomo = c; renderHomo(); }

function renderLeads() {
  var segs = ['todos'].concat([...new Set(E.leads.map(function(l){return l.seguimiento;}).filter(Boolean))]);
  document.getElementById('chips-leads').innerHTML = segs.map(function(s) {
    return '<button class="chip '+(E.filtroLeads===s?'active':'')+'" onclick="setFiltroLeads(''+s+'')">'+(s==='todos'?'Todos':s)+'</button>';
  }).join('');
  var lista = E.leads;
  if (E.filtroLeads !== 'todos') lista = lista.filter(function(l){return l.seguimiento===E.filtroLeads;});
  lista = filtrarQ(lista, ['nombre','curso','seguimiento']);
  document.getElementById('cnt-leads').textContent = lista.length;
  var el = document.getElementById('list-leads');
  if (!lista.length) { el.innerHTML = emptyHTML('📞','Sin leads'); return; }
  el.innerHTML = lista.map(function(l,i) {
    return '<div class="lead-card" style="animation-delay:'+Math.min(i,10)*0.03+'s"><div class="lead-top"><div><div class="lead-name">'+l.nombre+'</div><div class="lead-curso">'+(l.curso||'—')+'</div></div><div class="seg-badge '+claseSeg(l.seguimiento)+'">'+(l.seguimiento||'—')+'</div></div></div>';
  }).join('');
}
function setFiltroLeads(s) { E.filtroLeads = s; renderLeads(); }

function claseSeg(s) {
  if (!s) return 'seg-default';
  var x = s.toLowerCase();
  if (x.indexOf('nuevo') !== -1) return 'seg-nuevo';
  if (x.indexOf('contactado') !== -1) return 'seg-contactado';
  if (x.indexOf('interesado') !== -1) return 'seg-interesado';
  if (x.indexOf('no contesta') !== -1) return 'seg-no-contesta';
  if (x.indexOf('matriculado') !== -1) return 'seg-matriculado';
  return 'seg-default';
}

function renderFact() {
  document.getElementById('chips-fact').innerHTML = SERIES.map(function(s) {
    return '<button class="chip '+(E.filtroFact===s?'active':'')+'" onclick="setFiltroFact(''+s+'')">'+s+'</button>';
  }).join('');
  var lista = E.fact.filter(function(f){return f.serie===E.filtroFact;});
  lista = filtrarQ(lista, ['nombre','num']);
  document.getElementById('cnt-fact').textContent = lista.length;
  var el = document.getElementById('list-fact');
  if (!lista.length) { el.innerHTML = emptyHTML('📋','Sin facturas'); return; }
  el.innerHTML = lista.map(function(f,i) {
    var fj = JSON.stringify(f).replace(/"/g,'&quot;');
    return '<div class="fact-card" style="animation-delay:'+Math.min(i,10)*0.03+'s"><div class="fact-num">'+(f.num||'—')+'</div><div class="fact-info"><div class="fact-name">'+f.nombre+'</div></div><div class="fact-importe">'+precio(f.importe)+'</div><div class="edit-btn" onclick="abrirFactura('+fj+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div>';
  }).join('');
}
function setFiltroFact(s) { E.filtroFact = s; renderFact(); }

function abrirFactura(f) {
  document.getElementById('modal-sheet').innerHTML = '<div class="modal-handle"></div><div class="modal-title">Editar factura '+(f.num||'')+'</div><div class="modal-row"><div class="modal-label">Nombre y apellidos</div><input class="modal-input" id="edit-nombre" value="'+f.nombre+'"/></div><div class="modal-row"><div class="modal-label">Importe</div><input class="modal-input" id="edit-importe" value="'+f.importe+'"/></div><div class="modal-row"><div class="modal-label">Nº Factura</div><div class="modal-val" style="font-family:'DM Mono',monospace;color:var(--blue-logo)">'+(f.num||'—')+'</div></div><div class="modal-actions"><button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarFactura('+JSON.stringify(f).replace(/"/g,'&quot;')+')">Guardar</button></div>';
  document.getElementById('modal').classList.remove('hidden');
}

async function guardarFactura(f) {
  var nombre = document.getElementById('edit-nombre').value;
  var importe = document.getElementById('edit-importe').value;
  cerrarModal();
  toast('Guardando…');
  var ok = await sheetsUpdate(FACT_SHEET, f.hoja+'!B'+f.rowIndex+':E'+f.rowIndex, [[nombre,'','',importe]]);
  toast(ok ? '✔️ Guardado' : '⚠️ Error al guardar');
  if (ok) { await cargarFacturacion(); renderFact(); }
}

function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
function onOverlay(e) { if (e.target===document.getElementById('modal')) cerrarModal(); }

function precio(v) {
  if (!v) return '—';
  var n = parseFloat(String(v).replace(',','.'));
  if (isNaN(n)) return v;
  return n.toLocaleString('es-ES',{style:'currency',currency:'EUR'});
}

function emptyHTML(icon, msg) {
  return '<div class="empty"><div class="icon">'+icon+'</div><p>'+msg+'</p></div>';
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();}, 2600);
}
</script>
</body>
